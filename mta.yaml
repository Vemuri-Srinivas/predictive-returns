_schema-version: 3.3.0
ID: predictivereturns
version: 1.0.0
description: "Predictive Returns - Return Risk Prediction"
parameters:
  enable-parallel-deployments: true
  deploy_mode: html5-repo
build-parameters:
  before-all:
    - builder: custom
      commands:
        - npm ci
        - npx cds build --production

modules:
  - name: predictivereturns-srv
    type: nodejs
    path: gen/srv
    requires:
      - name: myaicore
        parameters:
          key: myaicore-key
      - name: predictivereturns-auth
      - name: predictivereturns-destination
    provides:
      - name: srv-api
        properties:
          srv-url: ${default-url}
    parameters:
      buildpack: nodejs_buildpack
      instances: 1
      memory: 256M
      disk-quota: 512M
      health-check-type: process
    build-parameters:
      builder: npm-ci

  - name: predictivereturns-approuter
    type: approuter.nodejs
    path: router
    parameters:
      disk-quota: 256M
      memory: 128M
    build-parameters:
      ignore:
        - node_modules
    requires:
      - name: srv-api
        group: destinations
        properties:
          name: srv-api
          url: ~{srv-url}
          forwardAuthToken: true
          timeout: 1200000
      - name: predictivereturns-html5-runtime
      - name: predictivereturns-destination
      - name: predictivereturns-auth

  - name: predictivereturns-ui
    type: html5
    path: ui
    build-parameters:
      builder: custom
      commands: []
      build-result: resources
      supported-platforms: []
      ignore:
        - node_modules
        - dist

  - name: predictivereturns-app-deployer
    type: com.sap.application.content
    path: ui
    parameters:
      delete-existing-service-keys: true
    requires:
      - name: predictivereturns-html5-repo-host
        parameters:
          content-target: true
    build-parameters:
      build-result: resources
      requires:
        - name: predictivereturns-ui
          artifacts:
            - predictivereturns.zip
          target-path: resources/

resources:
  - name: myaicore
    type: org.cloudfoundry.existing-service
    parameters:
      service-name: myaicore

  - name: predictivereturns-auth
    type: org.cloudfoundry.managed-service
    parameters:
      service: xsuaa
      service-plan: application
      service-name: predictivereturns-xsuaa
      path: ./xs-security.json
      config:
        xsappname: predictivereturns-${org}-${space}
        tenant-mode: dedicated

  - name: predictivereturns-html5-repo-host
    type: org.cloudfoundry.managed-service
    parameters:
      service: html5-apps-repo
      service-plan: app-host

  - name: predictivereturns-html5-runtime
    type: org.cloudfoundry.managed-service
    parameters:
      service: html5-apps-repo
      service-plan: app-runtime

  - name: predictivereturns-destination
    type: org.cloudfoundry.managed-service
    parameters:
      service: destination
      service-plan: lite
      config:
        HTML5Runtime_enabled: true
        init_data:
          instance:
            existing_destinations_policy: update
            destinations:
              - Name: srv-api
                URL: ~{srv-api/srv-url}
                Authentication: NoAuthentication
                Type: HTTP
                ProxyType: Internet
                HTML5.ForwardAuthToken: true
                HTML5.DynamicDestination: true
    requires:
      - name: srv-api
